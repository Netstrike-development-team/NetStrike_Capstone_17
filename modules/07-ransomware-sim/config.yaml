# Module 07 - Ransomware Simulation Configuration
# Simplified configuration for RansomHub-style ransomware simulation against ESXi infrastructure

# ============================================================================
# VCENTER CONFIGURATION
# ============================================================================
vcenter:
  host: vcenter.citef.local
  username: domain_admin
  password: REDACTED_FOR_SECURITY
  port: 443

# ============================================================================
# TARGET VIRTUAL MACHINES
# ============================================================================
target_vms:
  - CITEF-VM-01
  - CITEF-VM-02
  - DB-Server

# ============================================================================
# RANSOM PARAMETERS
# ============================================================================
ransom:
  amount: "$500,000"
  currency: "Bitcoin"
  attacker_email: contact@ransomhub.local
  deadline_days: 7

# ============================================================================
# FILE EXTENSIONS TO TARGET
# ============================================================================
file_extensions:
  - .vmdk
  - .docx
  - .xlsx
  - .pdf
  - .db

# ============================================================================
# SIMULATION MODE (Educational use)
# ============================================================================
simulation_mode: true
logging:
  level: INFO
