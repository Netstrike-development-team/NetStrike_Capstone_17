name: Lint and Test

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  module-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - modules/01-osint-profiler
          - modules/02-phishing-infra
          - modules/03-vishing-scripts
          - modules/04-mfa-fatigue-sim
          - modules/05-lateral-movement
          - modules/06-cloud-exfil
          - modules/07-ransomware-sim
          - orchestrator
          - dashboard
          - detection
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install global tooling
        run: |
          python -m pip install --upgrade pip
          pip install pylint pytest coverage

      - name: Install module requirements (if present)
        run: |
          if [ -f "${{ matrix.module }}/requirements.txt" ]; then
            pip install -r "${{ matrix.module }}/requirements.txt"
          fi

      - name: Lint module
        continue-on-error: true
        run: |
          pylint "${{ matrix.module }}/" \
            --ignore=__pycache__,output \
            --disable=missing-module-docstring,missing-class-docstring,missing-function-docstring,import-error \
            --fail-under=7.0

      - name: Run tests (if tests exist) and produce coverage
        run: |
          set -e
          module="${{ matrix.module }}"
          name="$(basename "$module")"
          if [ -d "$module/tests" ]; then
            (cd "$module" && coverage run -m pytest tests/ -v) || true
            (cd "$module" && coverage report -m > "../coverage_report_${name}.txt")
            (cd "$module" && coverage html -d "../htmlcov_${name}")
          else
            echo "No tests for $module"
          fi

      - name: Upload txt coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-txt-${{ matrix.module }}   # optional; artifact names can include full path
          path: coverage_report_*.txt

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ matrix.module }}
          path: htmlcov_*/
