name: Backend Lint and Test

# Runs pipeline when there're backend
# or when workflows are updated
on:
  push:
    branches:
      - '*'
    paths:
      - 'backend/**'
      - '.github/workflows/**'

  pull_request:
    branches:
      - '*'
    paths:
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  pylint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint code
        run: |
          pylint backend/

  flake8:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint code
        run: |
          flake8 backend/ --count --max-line-length=127 --statistics

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests
        run: |
          coverage run -m pytest backend/tests/

      - name: Generate coverage report
        run: |
          coverage report -m
          coverage html

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: htmlcov/
